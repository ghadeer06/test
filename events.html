<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>الفعاليات - محطة الدعم</title>

  <!-- مهم جدًا ./ -->
  <link rel="stylesheet" href="./analytics.css" />
  <link rel="stylesheet" href="./events.css" />
</head>

<body>

<header class="admin-header">
  <div class="admin-left">
    <img src="./img/logo.png" class="admin-logo">
    <div class="admin-title">
      <h1>الفعاليات</h1>
    </div>
  </div>
</header>

<main class="admin-main">

  <section class="events-section-box">
    <h2>فعاليات جديدة</h2>
    <div id="currentEventsContainer" class="events-grid"></div>
  </section>

  <section class="events-section-box">
    <h2>فعاليات سابقة</h2>
    <div id="pastEventsContainer" class="events-grid"></div>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  // 🔥 أهم شي: تأكد المكتبة موجودة
  if (!window.supabase) {
    alert("Supabase ما تحمل ❌");
    return;
  }

  const supabase = window.supabase.createClient(
    "https://mcxdjisoyqdnyieboqpy.supabase.co",
    "sb_publishable_CoPFxO5-flUjMYi-jOdikw_kwAaUoZr"
  );

  const currentContainer = document.getElementById("currentEventsContainer");
  const pastContainer = document.getElementById("pastEventsContainer");

  try {

    const { data, error } = await supabase
      .from("events")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      currentContainer.innerHTML = "خطأ في جلب البيانات";
      return;
    }

    if (!data || data.length === 0) {
      currentContainer.innerHTML = "لا توجد فعاليات";
      return;
    }

    const now = new Date();

    data.forEach(event => {
      const created = new Date(event.created_at);
      const diffDays = (now - created) / (1000 * 60 * 60 * 24);

      const card = `
        <div class="event-card">
          <h3>${event.title}</h3>
          <p>${event.description}</p>
          <p>${event.due_date}</p>
          ${event.image_url ? `<img src="${event.image_url}">` : ""}
        </div>
      `;

      if (diffDays <= 7) {
        currentContainer.innerHTML += card;
      } else {
        pastContainer.innerHTML += card;
      }
    });

  } catch (e) {
    console.log(e);
    currentContainer.innerHTML = "صار خطأ";
  }

});
</script>

</body>
</html>
