<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إضافة فعالية</title>
  <link rel="stylesheet" href="./add_event.css" />
</head>

<body>

<header class="admin-header">
  <div class="admin-left">
    <img src="./img/logo.png" class="admin-logo" alt="Logo">
    <div class="admin-title">
      <h1>إضافة فعالية</h1>
    </div>
  </div>

  <a href="./index.html" class="logout">تسجيل الخروج</a>
</header>

<div class="dashboard-layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>محطة الدعم</h2>
    </div>

    <ul class="sidebar-menu">
      <li><a href="./admin.html">الصفحة الرئيسية</a></li>
      <li><a href="./reports.html">البلاغات</a></li>
      <li><a href="./tasks.html">مهام السلامة</a></li>
      <li><a href="./analytics.html">التقارير</a></li>
      <li class="active"><a href="./events.html">الفعاليات</a></li>
    </ul>
  </aside>

  <main class="admin-main">
    <section class="event-form-box">
      <h2>إضافة فعالية جديدة</h2>

      <div class="event-field">
        <label for="eventTitle">عنوان الفعالية</label>
        <input type="text" id="eventTitle" placeholder="اكتبي عنوان الفعالية">
      </div>

      <div class="event-field">
        <label for="eventDesc">وصف الفعالية</label>
        <textarea id="eventDesc" placeholder="اكتبي وصفًا مختصرًا للفعالية"></textarea>
      </div>

      <div class="event-field">
        <label for="eventDate">تاريخ الفعالية</label>
        <input type="date" id="eventDate">
      </div>

      <div class="event-field">
        <label for="eventImage">صورة الفعالية</label>
        <input type="file" id="eventImage" accept="image/*">
      </div>

      <div class="preview-box" id="previewBox">
        <p>معاينة الصورة:</p>
        <img id="previewImage" src="" alt="معاينة الصورة">
      </div>

      <div class="event-actions">
        <button type="button" class="event-save-btn" id="saveBtn">حفظ الفعالية</button>
        <a href="./events.html" class="event-cancel-btn">رجوع للفعاليات</a>
      </div>
    </section>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  if (!window.supabase) {
    alert("تعذر تحميل المكتبة");
    return;
  }

  const supabase = window.supabase.createClient(
    "https://mcxdjisoyqdnyieboqpy.supabase.co",
    "sb_publishable_CoPFxO5-flUjMYi-jOdikw_kwAaUoZr"
  );

  const eventImageInput = document.getElementById("eventImage");
  const previewBox = document.getElementById("previewBox");
  const previewImage = document.getElementById("previewImage");
  const saveBtn = document.getElementById("saveBtn");

  eventImageInput.addEventListener("change", function () {
    const file = this.files[0];

    if (!file) {
      previewBox.style.display = "none";
      previewImage.src = "";
      return;
    }

    const reader = new FileReader();
    reader.onload = function (e) {
      previewImage.src = e.target.result;
      previewBox.style.display = "block";
    };
    reader.readAsDataURL(file);
  });

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      if (!file) {
        resolve("");
        return;
      }

      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(new Error("فشل قراءة الصورة"));
      reader.readAsDataURL(file);
    });
  }

  saveBtn.addEventListener("click", async function () {
    const title = document.getElementById("eventTitle").value.trim();
    const desc = document.getElementById("eventDesc").value.trim();
    const date = document.getElementById("eventDate").value;
    const file = document.getElementById("eventImage").files[0];

    if (!title || !desc || !date) {
      alert("الرجاء تعبئة عنوان الفعالية والوصف والتاريخ");
      return;
    }

    try {
      saveBtn.disabled = true;
      saveBtn.textContent = "جاري الحفظ...";

      let imageBase64 = "";

      if (file) {
        if (file.size > 800 * 1024) {
          alert("الصورة كبيرة، اختاري صورة أصغر من 800KB");
          saveBtn.disabled = false;
          saveBtn.textContent = "حفظ الفعالية";
          return;
        }

        imageBase64 = await fileToBase64(file);
      }

      const { error } = await supabase
        .from("events")
        .insert([
          {
            title: title,
            description: desc,
            due_date: date,
            image_url: imageBase64,
            status: "current",
            type: "فعالية",
            email: "admin@tvtc.edu.sa"
          }
        ]);

      if (error) {
        console.log(error);
        alert("صار خطأ في الحفظ: " + error.message);
        saveBtn.disabled = false;
        saveBtn.textContent = "حفظ الفعالية";
        return;
      }

      alert("تم حفظ الفعالية بنجاح");
      window.location.href = "./events.html";
    } catch (err) {
      console.log(err);
      alert("صار خطأ غير متوقع");
      saveBtn.disabled = false;
      saveBtn.textContent = "حفظ الفعالية";
    }
  });
});
</script>

</body>
</html>
