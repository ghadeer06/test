<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>مهام السلامة</title>
  <link rel="stylesheet" href="tasks.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header class="header">
  <h1>مهام السلامة</h1>
  <button onclick="exportExcel()">تصدير Excel</button>
</header>

<table>
  <thead>
    <tr>
      <th>الإجراء</th>
      <th>الحالة</th>
      <th>الموعد</th>
      <th>النوع</th>
      <th>المهمة</th>
    </tr>
  </thead>

  <tbody id="tasksTable"></tbody>
</table>

<script>
const supabase = window.supabase.createClient(
  "https://mcxdjisoyqdnyieboqpy.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jeGRqaXNveXFkbnlpZWJvcXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDI3NDAsImV4cCI6MjA5MDk3ODc0MH0.kIwJ1pc-GLX1lTvstLSDZ5Li1rd9vwutI4-Wz_HR6nE"
);

function nextDate(date, type){
  let d = new Date(date);

  if(type==="يومي") d.setDate(d.getDate()+1);
  if(type==="أسبوعي") d.setDate(d.getDate()+7);
  if(type==="شهري") d.setMonth(d.getMonth()+1);

  return d.toISOString().split("T")[0];
}

async function loadTasks(){
  let {data} = await supabase.from("tasks").select("*");

  let table = document.getElementById("tasksTable");
  table.innerHTML = "";

  data.forEach(t => {

    let buttons = "";

    if(t.status !== "تم التنفيذ"){
      buttons += `<button onclick="processing(${t.id})">يتم المعالجة</button>`;
      buttons += `<button onclick="done(${t.id}, '${t.type}', '${t.due_date}')">تم التنفيذ</button>`;
    }

    table.innerHTML += `
      <tr>
        <td>${buttons}</td>
        <td>${t.status}</td>
        <td>${t.due_date}</td>
        <td>${t.type}</td>
        <td>${t.title}</td>
      </tr>
    `;
  });
}

async function processing(id){
  await supabase.from("tasks")
  .update({status:"يتم المعالجة"})
  .eq("id", id);

  loadTasks();
}

async function done(id, type, date){

  let updateData = {
    status:"تم التنفيذ",
    completed_at:new Date()
  };

  if(type !== "مرة واحدة"){
    updateData.due_date = nextDate(date, type);
  }

  await supabase.from("tasks")
  .update(updateData)
  .eq("id", id);

  loadTasks();
}

function exportExcel(){
  let rows = [["المهمة","النوع","التاريخ","الحالة"]];

  document.querySelectorAll("tbody tr").forEach(tr=>{
    let tds = tr.querySelectorAll("td");
    rows.push([
      tds[4].innerText,
      tds[3].innerText,
      tds[2].innerText,
      tds[1].innerText
    ]);
  });

  let csv = rows.map(e=>e.join(",")).join("\n");
  let blob = new Blob([csv]);
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "tasks.csv";
  a.click();
}

loadTasks();
</script>

</body>
</html>
