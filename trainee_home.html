<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الصفحة الرئيسية - المتدرب</title>

  <!-- ربط التنسيق -->
  <link rel="stylesheet" href="studentHome.css">
</head>

<body>

  <!-- الهيدر -->
  <header class="admin-header">
    <div class="admin-left">
      <img src="img/logo.png" class="admin-logo" alt="Logo">
      <div class="admin-title">
        <h1>الصفحة الرئيسية</h1>
        <span>محطة الدعم - المتدرب</span>
      </div>
    </div>
    <a href="index.html" class="logout">تسجيل الخروج</a>
  </header>

  <!-- القائمة الجانبية -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>محطة الدعم</h2>
    </div>

    <ul class="sidebar-menu">
      <li class="active"><a href="trainee_home.html">الصفحة الرئيسية</a></li>
      <li><a href="trainee_reports.html">بلاغاتي</a></li>
      <li><a href="trainee_events.html">الفعاليات</a></li>
    </ul>
  </aside>

  <!-- المحتوى الرئيسي -->
  <main class="admin-main">

    <div class="events-container">

      <!-- مربع الفعاليات -->
      <div class="tasks-card">
        <div class="tasks-header">
          <h2>أحدث الفعاليات</h2>
        </div>

        <div id="latestEvents" class="home-box">
          <p>جاري تحميل الفعاليات...</p>
        </div>
      </div>

      <!-- مربع البلاغات -->
      <div class="tasks-card">
        <div class="tasks-header">
          <h2>أحدث البلاغات</h2>
        </div>

        <div id="latestReports" class="home-box">
          <p>جاري تحميل البلاغات...</p>
        </div>
      </div>

    </div>

  </main>

  <!-- الفوتر -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const supabase = window.supabase.createClient(
    "https://mcxdjisoyqdnyieboqpy.supabase.co",
    "sb_publishable_CoPFxO5-flUjMYi-jOdikw_kwAaUoZr"
  );

  // تحميل آخر فعاليتين
  async function loadLatestEvents() {
    const { data, error } = await supabase
      .from("events")
      .select("*")
      .order("created_at", { ascending: false })
      .limit(2);

    const box = document.getElementById("latestEvents");
    box.innerHTML = "";

    if (!data || data.length === 0) {
      box.innerHTML = "<p>لا توجد فعاليات حالياً</p>";
      return;
    }

    data.forEach(event => {
      box.innerHTML += `
        <div class="home-item">
          <strong>${event.title}</strong>
          <span>${event.due_date}</span>
        </div>
      `;
    });
  }

  // تحميل آخر بلاغين للمتدرب
  async function loadLatestReports() {
    const { data, error } = await supabase
      .from("reports")
      .select("*")
      .order("created_at", { ascending: false })
      .limit(2);

    const box = document.getElementById("latestReports");
    box.innerHTML = "";

    if (!data || data.length === 0) {
      box.innerHTML = "<p>لا توجد بلاغات حالياً</p>";
      return;
    }

    data.forEach(report => {
      box.innerHTML += `
        <div class="home-item">
          <strong>${report.title || "بلاغ"}</strong>
          <span>${report.created_at.split("T")[0]}</span>
        </div>
      `;
    });
  }

  loadLatestEvents();
  loadLatestReports();
});
</script>
  <footer class="main-footer">
    <div class="footer-content">
      <p>&copy; 2026 حقوق محفوظة | محطة الدعم</p>
      <ul class="footer-links">
        <li><a href="student_home.html">الرئيسية</a></li>
        <li><a href="about.html">عن الموقع</a></li>
      </ul>
    </div>
  </footer>
</body>
</html>
