<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>الصفحة الرئيسية - محطة الدعم</title>

  <link rel="stylesheet" href="admin.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header class="admin-header">
  <div class="admin-left">
    <img src="img/logo.png" class="admin-logo" alt="Logo">
    <div class="admin-title">
      <h1>الصفحة الرئيسية</h1>
      <span>نظرة عامة على النظام</span>
    </div>
  </div>

  <a href="index.html" class="logout">تسجيل الخروج</a>
</header>

<aside class="sidebar">
  <div class="sidebar-brand">
    <h2>محطة الدعم</h2>
  </div>

  <ul class="sidebar-menu">
    <li class="active"><a href="#">الصفحة الرئيسية</a></li>
    <li><a href="reports.html">البلاغات</a></li>
    <li><a href="tasks.html">مهام السلامة</a></li>
    <li><a href="analytics.html">التقارير</a></li>
    <li><a href="events.html">الفعاليات</a></li>
  </ul>
</aside>

<main class="admin-main">

  <!-- الكروت -->
  <div class="admin-cards">
    <div class="stat-card">
      <h3>إجمالي البلاغات</h3>
      <p id="countReports">0</p>
    </div>

    <div class="stat-card">
      <h3>إجمالي المهام</h3>
      <p id="countTasks">0</p>
    </div>

    <div class="stat-card">
      <h3>الإشعارات الجديدة</h3>
      <p id="countNotifications">0</p>
    </div>
  </div>

  <!-- أحدث البلاغات -->
  <section class="reports-section">
    <h2 class="section-title">أحدث البلاغات</h2>
    <div class="reports-box" id="latestReports"></div>
  </section>

  <!-- أحدث الإشعارات -->
  <section class="reports-section">
    <h2 class="section-title">أحدث الإشعارات</h2>
    <div class="reports-box" id="latestNotifications"></div>
  </section>

  <!-- أحدث المهام -->
  <section class="reports-section">
    <h2 class="section-title">أحدث المهام</h2>
    <div class="reports-box" id="latestTasks"></div>
  </section>

</main>

<footer class="main-footer">
  <div class="footer-content">
    <p>&copy; 2026 حقوق محفوظة | محطة الدعم</p>
  </div>
</footer>

<script src="home_logic.js"></script>

</body>
</html>
